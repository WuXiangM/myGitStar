name: Update myGitStar Summaries

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 300 # 超时时间，单位分钟
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Set workflow actor env
        run: echo "GITHUB_ACTOR=${{ github.actor }}" >> $GITHUB_ENV

      - name: Read workflow flags from config.yaml
        id: cfg
        run: |
          python - <<'PY'
          import os
          import yaml

          d = yaml.safe_load(open('config.yaml', 'r', encoding='utf-8')) or {}

          classify_only = 'true' if bool(d.get('workflow_classify_only')) else 'false'

          def _to_int(v, default):
              try:
                  return int(v)
              except Exception:
                  return int(default)

          min_cat = _to_int(d.get('content_min_categories', 5), 5)
          max_cat = _to_int(d.get('content_max_categories', 8), 8)
          min_repos_per_cat = _to_int(d.get('content_min_repos_per_category', 0), 0)
            update_mode = str(d.get('update_mode', 'all') or 'all').strip().lower().replace('-', '_')
            if update_mode in ('missing', 'missingonly', 'missing_only', 'incremental'):
              update_mode = 'missing_only'
            elif update_mode in ('all', 'full'):
              update_mode = 'all'
            else:
              update_mode = 'all'
          if min_cat < 1:
              min_cat = 1
          if max_cat < min_cat:
              max_cat = min_cat

          out_path = os.environ.get('GITHUB_OUTPUT')
          if not out_path:
              raise SystemExit('GITHUB_OUTPUT is not set')

          with open(out_path, 'a', encoding='utf-8') as f:
              f.write(f"classify_only={classify_only}\n")
              f.write(f"update_mode={update_mode}\n")
              f.write(f"min_categories={min_cat}\n")
              f.write(f"max_categories={max_cat}\n")
              f.write(f"min_repos_per_category={min_repos_per_cat}\n")
          PY

      - name: Print effective workflow settings
        run: |
          echo "classify_only=${{ steps.cfg.outputs.classify_only }}"
          echo "update_mode=${{ steps.cfg.outputs.update_mode }}"
          echo "min_categories=${{ steps.cfg.outputs.min_categories }}"
          echo "max_categories=${{ steps.cfg.outputs.max_categories }}"
          echo "min_repos_per_category=${{ steps.cfg.outputs.min_repos_per_category }}"

      - name: Ensure README_lang.md exists (classify-only mode)
        if: steps.cfg.outputs.classify_only == 'true'
        run: |
          test -f README_lang.md || (echo "README_lang.md not found. Either run summarize first, or commit README_lang.md to the repo." && exit 1)

      - name: Summarize starred repos with ai
        if: steps.cfg.outputs.classify_only != 'true'
        env:
          STARRED_GITHUB_TOKEN: ${{ secrets.STARRED_GITHUB_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          python scripts/summarize_stars.py --language en --out README_lang.md --update-mode ${{ steps.cfg.outputs.update_mode }}
          python scripts/summarize_stars.py --language zh --out README_lang_cn.md --update-mode ${{ steps.cfg.outputs.update_mode }}

      - name: Classify repos by content from README
        env:
          STARRED_GITHUB_TOKEN: ${{ secrets.STARRED_GITHUB_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_ACTOR: ${{ github.actor }}
          # More conservative settings to reduce 429; and allow fallback if Copilot is rate-limited.
          MYGITSTAR_FALLBACK_ON_429: '1'
          MYGITSTAR_MAX_CONSECUTIVE_429: '5'
          MYGITSTAR_RETRY_ATTEMPTS: '4'
          MYGITSTAR_REQUEST_RETRY_DELAY: '4'
          MYGITSTAR_GLOBAL_QPS: '0.25'
          MYGITSTAR_RATE_LIMIT_DELAY: '6'
        run: |
          python scripts/classify_stars_by_content.py \
            --from-readme "README_lang.md" \
            --min-categories ${{ steps.cfg.outputs.min_categories }} \
            --max-categories ${{ steps.cfg.outputs.max_categories }} \
            --min-repos-per-category ${{ steps.cfg.outputs.min_repos_per_category }} \
            --sample-size 60 \
            --batch-size 40 \
            --out-md README.md \
            --out-json repo_categories.json

      - name: Print Copilot API call count
        if: steps.cfg.outputs.classify_only != 'true'
        env:
          STARRED_GITHUB_TOKEN: ${{ secrets.STARRED_GITHUB_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: python scripts/summarize_stars.py --copilot-count

      - name: Commit and push changes
        env:
          STARRED_GITHUB_TOKEN: ${{ secrets.STARRED_GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md repo_categories.json
          test -f README_lang.md && git add README_lang.md || true
          test -f README_lang_cn.md && git add README_lang_cn.md || true
          git commit -m "update AI summarized stars [bot]" || echo "No changes to commit"
          git remote set-url origin https://x-access-token:${STARRED_GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git pull --rebase origin main || echo "No remote changes to pull"
          git push origin HEAD:main
