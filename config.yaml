# 输出语言，可选值: 'zh' (中文), 'en' (英文)
# Output language, options: 'zh', 'en'
language: en

# 是否在生成的 README 顶部显示中英文快速跳转链接
# 当为 true 时，优先显示与 `language` 对应的语言在前；为 false 则反向显示
repo_display_language: true

# 模型选择，可选值: 'copilot'、'openrouter' 或 'gemini'
# Model selection: 'copilot', 'openrouter', 'gemini'
model_choice: copilot


# GitHub用户名，设置为0时自动使用 workflow 账号，或填写指定用户名
# GitHub username, set 0 to use workflow account or specify username
github_username: 0

# Copilot 模型名称（用于 GitHub Models / Copilot 作为后端时）
# Copilot model name (used when backend is GitHub Models / Copilot)
default_copilot_model: openai/gpt-4o-mini

# OpenRouter 模型名称（用于 model_choice: openrouter）
# OpenRouter model name (used when model_choice: openrouter)
default_openrouter_model: deepseek/deepseek-prover-v2:free

# Gemini 模型名称（用于 model_choice: gemini）
# Gemini model name (used when model_choice: gemini)
default_gemini_model: gemini-2.0-flash

# 输出文件路径（按语言分类版 README，建议：英文 README_lang.md；中文 README_lang_cn.md）
# Output file path (language-classified README). Recommended: English README_lang.md; Chinese README_lang_cn.md
# Note: The content-classified README is generated separately as README.md.
readme_sum_path: README_lang.md # default output for summarize_stars.py


# 最大并发数（线程池 worker 数），建议先用 1，避免触发速率限制
# Max concurrency (thread workers). Start with 1 to avoid rate limiting.
max_workers: 1 # 最大并发数，建议根据个人网络环境调整

# 每个批次处理的仓库数量（批次越大，请求越重，越容易触发限流/超时）
# Repositories per batch (bigger batch = heavier request; more likely to hit rate limits/timeouts)
batch_size: 4 # 每个请求处理的仓库数量（保守推荐: 4）

# 请求超时时间（秒）
# Request timeout (seconds)
request_timeout: 30 # s, 每个请求的超时时间

# 每个批次之间的延迟（秒），用于降低总体速率
# Delay between batches (seconds) to reduce overall request rate
rate_limit_delay: 5 # s, 每个批次之间的延迟（保守，减少总体速率）

# 网络层重试：每次重试之间的延迟（秒）
# Network retry: delay between attempts (seconds)
request_retry_delay: 2 # s, 每个请求重试的延迟（网络层）

# 网络层重试次数（保守建议：1~3）
# Network retry attempts (conservative: 1~3)
retry_attempts: 1 # 每个请求重试次数（保守：1）

# Gemini 特定的保守配置

# 生成层重试次数（例如：内容不完整、解析失败时）
# Generation-level retries (e.g., incomplete/invalid model output)
gemini_generation_retries: 1 # 每个请求重试次数（保守：1）

# 重试退避倍数（每次重试延迟 * backoff）
# Retry backoff multiplier (delay * backoff each retry)
gemini_retry_backoff: 2 # 每次重试的延迟倍数（保守：2）

# 网络层重试次数（Gemini 请求）
# Network retry attempts (Gemini requests)
gemini_retry_attempts: 1 # 每个请求重试次数（保守：1）

# 网络层重试延迟（秒，Gemini 请求）
# Network retry delay (seconds, Gemini requests)
gemini_retry_delay: 2 # s, 每次重试的延迟（保守：2）

# Gemini 最大输出 token 数（过小可能导致输出被截断）
# Gemini max output tokens (too small may truncate output)
gemini_max_output_tokens: 2000 # 最大输出token数（保守：2000）

# 每次运行处理的最大仓库数，优先使用环境变量 MAX_REPOS，如未设置则使用此配置（0 或留空 表示不限制）
# Max repositories per run. Env var MAX_REPOS overrides this. 0/empty means no limit.
max_repos: 50

# 更新模式，可选值：'all'（全部更新）或 'missing_only'（仅更新缺失总结）
# Update mode: 'all' or 'missing_only'
update_mode: missing_only


# 内容分类：类别数量区间（用于 classify_stars_by_content.py）
# Content classification: category count range (used by classify_stars_by_content.py)
content_min_categories: 5
content_max_categories: 12


# Workflow 仅执行内容分类：为 true 时，GitHub Actions 将跳过 summarize_stars.py，只运行 classify_stars_by_content.py
# 注意：开启后需要仓库中已存在 README_lang.md（工作流会用它作为 --from-readme 输入）
# Workflow classify-only: when true, GitHub Actions skips summarize_stars.py and only runs classify_stars_by_content.py
# Note: when enabled, README_lang.md must already exist in the repo (used as --from-readme input)
workflow_classify_only: false


# 可选：直接在 config 中存放密钥（不推荐，优先从环境变量读取，默认留空）
# Optional: store keys here (not recommended; prefer environment variables)
STARRED_GITHUB_TOKEN: "" # GitHub Token
OPENROUTER_API_KEY: ""
GEMINI_API_KEY: ""

# 测试模式开关：为 true 时只处理第一个星标仓库（便于调试）
# Test mode switch: when true, process only the first starred repo (for debugging)
test_first_repo: false